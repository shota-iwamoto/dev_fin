apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dev-finace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: dev-finace-api:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: app-env
          env:
            - name: MARIADB_HOST
              value: mariadb
            - name: VALKEY_HOST
              value: valkey
          volumeMounts:
            - name: src
              mountPath: /code/src
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: src
          hostPath:
            path: /host-src
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dev-finace
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
