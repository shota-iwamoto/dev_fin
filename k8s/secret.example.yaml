# 参考用テンプレート。実際の Secret は scripts/k8s-up.sh が
# `kubectl create secret generic app-env --from-env-file=.env` で
# リポジトリ直下の .env から自動生成するため、このファイル自体は適用しない。
apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: dev-finace
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: root_password
  MARIADB_DATABASE: app_db
  MARIADB_USER: app_user
  MARIADB_PASSWORD: app_password
  MARIADB_PORT: "3306"
  VALKEY_PORT: "6379"
  API_PORT: "8000"
